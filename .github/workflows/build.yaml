name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "go.mod"
      - "*.go"
      - "internal/**"
      - "config.example.yaml"
      - "*.sh"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@v1
    with:
      registries: "ghcr"
      skip-build-guard: true
      notify-repo: "cplieger/homelab"
    secrets: inherit
