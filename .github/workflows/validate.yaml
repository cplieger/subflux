name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install tools
        run: |
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          VERSION=v2.12.2
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
            | sh -s -- -b /usr/local/bin "${VERSION}"

          # tsgo
          TMP=$(mktemp -d)
          npm pack @typescript/native-preview-linux-x64@latest \
            --pack-destination "$TMP" --loglevel=warn
          tar xzf "$TMP"/*.tgz -C "$TMP"
          sudo cp -r "$TMP/package/lib" /usr/local/lib/tsgo
          sudo ln -sf /usr/local/lib/tsgo/tsgo /usr/local/bin/tsgo
          rm -rf "$TMP"

          # Web lint tools
          npm install -g --loglevel=warn html-validate stylelint stylelint-config-standard

      - name: Verify dependencies
        run: go mod verify

      - name: Compile TypeScript
        run: cd internal/server/static-src && tsgo --noEmit

      - name: Lint Go
        run: golangci-lint run --timeout=5m ./...

      - name: Test Go
        run: go test -count=1 ./...

      - name: Lint web (HTML/CSS)
        run: |
          find internal/server/static -name "*.html" -print0 \
            | xargs -0 --no-run-if-empty \
              html-validate --config .web-lint/.htmlvalidate.json
          find internal/server/static -name "*.css" -print0 \
            | xargs -0 --no-run-if-empty \
              stylelint --config .web-lint/.stylelintrc.json

      - name: Lint shell scripts
        run: shellcheck -x -S info *.sh

      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:2.12.0 \
            hadolint --ignore DL3018 --ignore DL3008 --ignore DL4006 - < Dockerfile

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"
