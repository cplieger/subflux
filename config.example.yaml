# ---------------------------------------------------------------------------
# Subflux - subtitle search and sync engine
# ---------------------------------------------------------------------------

sonarr:
  enabled: true # disable to skip Sonarr integration
  url: "http://sonarr:8989" # internal Docker hostname or IP:port
  api_key: "" # required; from Settings > General
  public_url: "" # browser URL, e.g. https://sonarr.example.com

radarr:
  enabled: true # disable to skip Radarr integration
  url: "http://radarr:7878" # internal Docker hostname or IP:port
  api_key: "" # required; from Settings > General
  public_url: "" # browser URL, e.g. https://radarr.example.com

# Must match the media paths inside Sonarr/Radarr containers.
# If you change this, update the volume mounts in compose.yaml too.
# Multiple roots supported (e.g. /movies and /tv mounted separately).
media_roots:
  - /media

# Reverse-proxy trust for client-IP resolution.
# When subflux runs behind a reverse proxy (nginx, Caddy, Traefik, HAProxy, ...)
# the socket peer is the proxy, not the client. Set trusted_proxies to the
# proxy's IP/CIDR so the real client IP (resolved from a trusted
# X-Forwarded-For) is used for the audit log, the login rate limiter, the
# session IPAddress, and the access log — instead of the proxy's address.
# Entries are CIDR ranges; write a single proxy as a /32 (IPv4) or /128 (IPv6).
# Leave empty (the default) when subflux is directly exposed: the socket peer
# is used and X-Forwarded-For is ignored (spoof-safe).
trusted_proxies: []
#  - 10.0.0.0/8
#  - 192.168.0.0/16

# How often to check Sonarr/Radarr for new imports (minimum 10s).
poll_interval: 30s

# ---------------------------------------------------------------------------
# Language configuration
# ---------------------------------------------------------------------------

# Audio-to-subtitle language mapping using ISO 639-1 codes.
# https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes
# Special code: "pb" = Brazilian Portuguese (distinct from "pt" = European Portuguese).
# At least one of "rules" or "default" must be configured.
languages:
  rules:
    # Simple: English audio -> French subtitles
    - audio: en
      subtitles:
        - code: fr
          min_score: 80 # per-target minimum score override

    # Variants: French audio -> English standard + forced
    - audio: fr
      subtitles:
        - code: en
          variants: [standard, forced] # standard, forced, or hi

    # Provider filter: Japanese audio -> specific providers only
    - audio: ja
      subtitles:
        - code: en
          providers: [opensubtitles, animetosho]
          exclude: [yifysubtitles] # skip these providers

    # Skip: Spanish audio -> no subtitles (prevents default)
    - audio: es
      subtitles: []

  # Fallback when no rule matches. Remove to skip unmatched languages.
  default:
    - code: en
    - code: fr

# ---------------------------------------------------------------------------
# Embedded subtitles
# ---------------------------------------------------------------------------

# Embedded track detection is always active (local ffprobe inspection, not a
# provider). These settings decide which codecs count as usable subtitles:
# ignored codecs stay visible in coverage but trigger external search.
embedded_subtitles:
  ignore_pgs: true # PGS bitmap subs (Blu-ray) don't satisfy a target
  ignore_vobsub: true # VobSub bitmap subs (DVD) don't satisfy a target
  ignore_ass: false # ASS/SSA styled subs (anime) count as usable

# ---------------------------------------------------------------------------
# Subtitle providers
# ---------------------------------------------------------------------------

providers:
  hdbits:
    enabled: false
    priority: 1 # tiebreaker: lower = more trusted
    settings:
      username: "" # hdbits.org account
      passkey: "" # from hdbits.org user settings
  opensubtitles:
    enabled: false
    priority: 2
    settings:
      username: "" # opensubtitles.com account
      password: "" # opensubtitles.com password
      api_key: "" # from opensubtitles.com/consumers
      use_hash: true # match by file hash (fast, exact)
      include_ai_translated: false # include AI/machine-translated subs
  betaseries:
    enabled: false
    priority: 3
    settings:
      token: "" # from betaseries.com/en/account/api
  gestdown:
    enabled: true
    priority: 4 # Addic7ed proxy, TV shows only, no auth
  subsource:
    enabled: false
    priority: 5
    settings:
      api_key: "" # from subsource.net API registration
  subdl:
    enabled: false
    priority: 7
    settings:
      api_key: "" # from subdl.com API registration
  animetosho:
    enabled: true
    priority: 8
    settings:
      anidb_client_key: "" # optional; enables AniDB episode ID search
  yifysubtitles:
    enabled: true
    priority: 9

# ---------------------------------------------------------------------------
# Search behavior
# ---------------------------------------------------------------------------
# Duration units (case-sensitive):
#   s  = seconds       m  = minutes       h  = hours
#   D  = days (24h)    M  = months (730h) Y  = years (8760h)
# Fractional values OK for all units: 0.5D = 12h, 1.5h = 90m. s/m/h can be combined: 1h30m.

search:
  scan_interval: 24h # time between scan completions (minimum 1h)
  provider_timeout: 1h # cooldown after a provider fails repeatedly (minimum 1h)
  scan_delay: 5s # delay after items that queried providers during scans (minimum 5s; items needing no provider work skip it)
  upgrade_enabled: true # search for better subtitles during scans
  upgrade_window_days: 7 # only upgrade subtitles for this many days
  exclude_arr_tags: # skip media with these Sonarr/Radarr tags
    - no-subflux

adaptive:
  initial_delay: 7D # wait before retrying after search
  max_delay: 90D # maximum wait between retries
  backoff_multiplier: 2 # multiply delay after each search
  max_attempts: 10 # 0 = retry forever

# ---------------------------------------------------------------------------
# Post-processing
# ---------------------------------------------------------------------------

# Applied to every downloaded subtitle before saving to disk.
post_processing:
  sync_subtitles: true # sync timing against embedded subs on import
  audio_sync_fallback: false # fall back to audio sync if no reference sub
  strip_hi: false # remove [sounds], (music), SPEAKER: labels
  strip_tags: true # remove <i>, <b>, <u>, <font> HTML tags
  normalize_utf8: true # convert UTF-16/Windows-1252 to UTF-8
  normalize_endings: true # convert line endings to CRLF (SRT standard)
  clean_whitespace: true # trim lines, remove empty lines
  remove_empty: true # drop cues with no text after processing

# ---------------------------------------------------------------------------
# Scoring
# ---------------------------------------------------------------------------

# Weights control how subtitles are ranked. Higher = better match.
# Hash match scores 100 automatically. All other weights sum to 100.
scoring:
  weights:
    hash: 100
    source: 28 # BluRay, WEB-DL, HDTV
    release_group: 23
    streaming_service: 14 # AMZN, NF, DSNP
    edition: 15 # Director's Cut, Extended, etc.
    video_codec: 10
    hdr: 8
    season_pack: 15 # Consistent subs across episodes

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Uses Go slog; json format is parsed by Alloy/Loki for Grafana dashboards.
# Use text format for local development or terminal debugging.
logging:
  level: info # debug, info, warn, error
  format: json # json or text
