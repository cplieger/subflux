<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#1a1510" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f5f5" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Subflux — Sign In</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/login.css">
</head>
<body>

<!-- Login form -->
<main id="loginPage" class="auth-page" aria-label="Sign in">
  <div class="auth-card">
    <h1>Subflux</h1>

    <div id="loginError" class="auth-error" hidden></div>

    <!-- Password login form -->
    <form id="loginForm" method="post" action="/api/auth/login" autocomplete="on">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
        autocomplete="username webauthn" required autofocus
        placeholder="Username">

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
        autocomplete="current-password" required
        placeholder="Password">

      <button type="submit" id="loginBtn">Sign in</button>
    </form>

    <!-- Divider -->
    <div id="authDivider" class="auth-divider" hidden><span>or</span></div>

    <!-- Passkey button -->
    <button type="button" id="passkeyBtn" class="auth-alt-btn" hidden>
      Sign in with passkey
    </button>

    <!-- OIDC button -->
    <button type="button" id="oidcBtn" class="auth-alt-btn" hidden>
      Sign in with SSO
    </button>
  </div>
</main>

<!-- TOTP verification (shown after password step) -->
<main id="totpPage" class="auth-page" hidden aria-label="Two-factor verification">
  <div class="auth-card">
    <h2>Two-Factor Authentication</h2>
    <p>Enter the code from your authenticator app</p>

    <div id="totpError" class="auth-error" hidden></div>

    <form id="totpForm" method="post" action="/api/auth/totp" autocomplete="on">
      <label for="totpCode">Code</label>
      <input type="text" id="totpCode" name="code"
        autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*"
        maxlength="8" required autofocus
        placeholder="000000">

      <button type="submit">Verify</button>
    </form>

    <p class="auth-hint">You can also use a recovery code</p>
  </div>
</main>

<!-- Setup: Step 1 - Account creation -->
<main id="setupPage" class="auth-page" hidden aria-label="Initial setup">
  <div class="auth-card">
    <h2>Welcome to Subflux</h2>
    <p>Create your admin account to get started</p>

    <div id="setupError" class="auth-error" hidden></div>

    <form id="setupForm" method="post" action="/api/auth/setup" autocomplete="on">
      <label for="setupUsername">Username</label>
      <input type="text" id="setupUsername" name="username"
        autocomplete="username" required autofocus
        placeholder="admin">

      <label for="setupPassword">Password</label>
      <input type="password" id="setupPassword" name="password"
        autocomplete="new-password" required
        minlength="15" maxlength="128"
        passwordrules="minlength: 15; maxlength: 128;"
        placeholder="Choose a strong password">

      <p class="auth-hint">Minimum 15 characters</p>

      <button type="submit">Create Account</button>
    </form>
  </div>
</main>

<!-- Setup: Step 2 - Configuration wizard -->
<main id="configWizardPage" class="auth-page auth-page-wide" hidden aria-label="Configuration wizard">
  <h2 class="wizard-title">Configure Subflux</h2>
  <div class="auth-card auth-card-wide">
    <div id="wizardError" class="auth-error" hidden></div>
    <div id="wizardSection" class="wizard-section"></div>

    <div class="wizard-nav">
      <button type="button" id="wizardBack" class="wizard-back" aria-disabled="true">Back</button>
      <div id="wizardProgress" class="wizard-progress"></div>
      <button type="button" id="wizardNext">Next</button>
      <button type="button" id="wizardFinish" hidden>Finish</button>
    </div>
  </div>
</main>

<script type="module" src="/login.js"></script>
</body>
</html>
