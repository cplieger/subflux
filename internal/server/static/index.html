<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#1a1510" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f5f5" media="(prefers-color-scheme: light)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Subflux</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="/theme-init.js"></script>
<link rel="stylesheet" href="/style.css" fetchpriority="high">
</head>
<body>

<header>
<h1><a href="/">Subflux</a></h1>
<nav aria-label="Quick actions">
<button type="button" class="nav-btn ghost" id="statusBtn"
  popovertarget="statusPopup" aria-label="Status">
  <span class="nav-icon" id="statusIcon"><span class="icon icon-dot"></span></span>
  <span class="nav-label">Status</span>
</button>
<button type="button" class="nav-btn ghost" id="historyBtn" aria-label="Download history">
  <span class="nav-icon"><span class="icon icon-history"></span></span>
  <span class="nav-label">History</span>
</button>
<button type="button" class="nav-btn ghost" id="configBtn" aria-label="Settings" hidden>
  <span class="nav-icon"><span class="icon icon-settings"></span></span>
  <span class="nav-label">Settings</span>
</button>
<button type="button" class="nav-btn ghost" id="themeBtn" data-action="theme" aria-label="Toggle theme" hidden>
  <span class="nav-icon"><span class="icon icon-moon"></span></span>
</button>
<button type="button" class="nav-btn ghost" id="userBtn" aria-label="User menu"
  popovertarget="userMenuPopup">
  <span class="nav-icon"><span class="icon icon-user"></span></span>
</button>
</nav>
</header>

<div id="statusPopup" popover role="group" aria-label="Status"></div>

<div id="userMenuPopup" popover role="menu" aria-label="User menu"></div>

<dialog class="dlg-security" id="securityDialog" aria-label="Security settings"></dialog>

<dialog class="dlg-search" id="searchResultPopup"
  aria-label="Search results" tabindex="-1"></dialog>

<dialog class="dlg-sync" id="syncDialog"
  aria-label="Subtitle sync" tabindex="-1"></dialog>

<dialog class="dlg-confirm" id="seasonSyncConfirm"
  aria-label="Season audio sync" tabindex="-1"></dialog>

<dialog class="dlg-confirm" id="confirmDialog"
  aria-label="Confirm action" tabindex="-1"></dialog>

<main>

<section class="card" id="coveragePanel" data-page="coverage" aria-labelledby="lib-heading">
<div class="card-head" hidden>
  <h2 id="lib-heading">Library</h2>
  <div class="controls">
    <label class="toggle" aria-label="Missing only">
      <span data-tip="Show only items with incomplete subtitle coverage">Missing only</span>
      <input type="checkbox" id="cov-missing"><span></span>
    </label>
    <select id="cov-type-filter" aria-label="Media type filter">
      <option value="all">All</option>
      <option value="series">Series</option>
      <option value="movies">Movies</option>
    </select>
    <select id="cov-sort" aria-label="Sort by">
      <option value="title">A-Z</option>
      <option value="title-desc">Z-A</option>
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
    </select>
    <input id="cov-filter" type="search" placeholder="Filter library&#x2026;"
      aria-label="Filter library" autocomplete="off" enterkeyhint="search" spellcheck="false">
  </div>
</div>
<div id="coverageContent"></div>
</section>

<section class="card" id="historyPanel" data-page="history" aria-labelledby="hist-heading" hidden>
<div class="card-head">
  <h2 id="hist-heading">History</h2>
  <div class="controls">
    <select id="h-type" aria-label="Media type filter">
      <option value="">All types</option>
      <option value="episode">Episodes</option>
      <option value="movie">Movies</option>
    </select>
    <select id="h-lang" aria-label="Language filter">
      <option value="">All languages</option>
    </select>
    <select id="h-provider" aria-label="Provider filter">
      <option value="">All providers</option>
    </select>
    <input id="h-filter" type="search" placeholder="Filter media&#x2026;"
      aria-label="Filter downloads" autocomplete="off" enterkeyhint="search" spellcheck="false">
  </div>
</div>
<div id="historyContent"></div>
</section>

</main>

<footer>
<a href="/">
  <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47
     7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
     1.08.58 1.23.82.72 1.21 1.87.87
     2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
     0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
     0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04
     2.2-.82 2.2-.82.44 1.1.16 1.92.08
     2.12.51.56.82 1.27.82 2.15 0 3.07-1.87
     3.75-3.65 3.95.29.25.54.73.54
     1.48 0 1.07-.01 1.93-.01
     2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
  </svg>
  Subflux &#183; <span id="footerYear">2026</span> &#183; GPL-3.0
</a>
</footer>

<dialog class="dlg-config" id="configDialog" aria-label="Settings">
<form autocomplete="off" data-bwignore data-1p-ignore>
  <div class="dlg-head">
    <h2>Settings</h2>
    <button type="button" class="close-btn ghost" id="configClose"
      aria-label="Close settings"><span class="icon icon-close"></span></button>
  </div>
  <div id="configBody" class="dlg-body"></div>
  <div class="dlg-foot">
    <button type="submit" id="saveConfigBtn">Save</button>
  </div>
</form>
</dialog>

<script type="importmap">
{
  "imports": {
    "@cplieger/actions": "/vendor/cplieger-actions/index.js",
    "@cplieger/reactive": "/vendor/cplieger-reactive/index.js"
  }
}
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
