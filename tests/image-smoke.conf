# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Waits for the container HEALTHCHECK to report
# "healthy" - proving the binary runs, the embedded web UI is present, the
# ffmpeg/runtime deps are in the image, and the health probe works. subflux
# starts in unconfigured mode (web UI + config endpoints) with no env, so it
# becomes healthy on its own - no run args needed.
SMOKE_APP_NAME=subflux
SMOKE_TIMEOUT=90
